<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Redirecting you to the official India District Competition Site</title>

  <meta
    name="description"
    content="Redirecting you to the official India District Competition Site."
  />

  <style>
    :root {
      color-scheme: dark;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #f8fafc;
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.22), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.2), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a 55%, #111827);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
    }

    body::before {
      top: -100px;
      right: -80px;
      background: #22c55e;
    }

    body::after {
      bottom: -120px;
      left: -70px;
      background: #3b82f6;
    }

    .card {
      position: relative;
      width: min(92%, 560px);
      padding: 48px 38px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .logo {
      width: 76px;
      height: 76px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #052e16;
      background: linear-gradient(135deg, #86efac, #22c55e);
      box-shadow: 0 16px 40px rgba(34, 197, 94, 0.28);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3.25rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .subtitle {
      max-width: 430px;
      margin: 18px auto 0;
      color: #cbd5e1;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .destination {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
      padding: 9px 14px;
      border: 1px solid rgba(134, 239, 172, 0.22);
      border-radius: 999px;
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.08);
      font-size: 0.9rem;
      word-break: break-all;
    }

    .loader {
      width: 100%;
      height: 6px;
      margin-top: 32px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .loader span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #60a5fa);
      transform-origin: left;
      animation: countdown 3s linear forwards;
    }

    .status {
      margin-top: 14px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 13px 22px;
      border: 0;
      border-radius: 14px;
      color: #052e16;
      background: #86efac;
      font-weight: 750;
      text-decoration: none;
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        background 160ms ease;
      box-shadow: 0 12px 28px rgba(34, 197, 94, 0.2);
    }

    .button:hover {
      transform: translateY(-2px);
      background: #bbf7d0;
      box-shadow: 0 16px 34px rgba(34, 197, 94, 0.28);
    }

    .button:focus-visible {
      outline: 3px solid rgba(134, 239, 172, 0.45);
      outline-offset: 4px;
    }

    .footer {
      margin-top: 30px;
      color: #64748b;
      font-size: 0.78rem;
    }

    @keyframes countdown {
      from {
        transform: scaleX(0);
      }

      to {
        transform: scaleX(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader span {
        animation: none;
        transform: scaleX(1);
      }

      .button {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo" aria-hidden="true">ENC</div>

    <h1>Taking you to ENC India</h1>

    <p class="subtitle">
      You are being securely redirected to the official ENC India website.
    </p>

    <div class="destination">
      <span aria-hidden="true">🔒</span>
      https://enc-india.info
    </div>

    <div class="loader" aria-hidden="true">
      <span></span>
    </div>

    <p class="status" id="status">
      Redirecting in <strong id="countdown">3</strong> seconds…
    </p>

    <a
      class="button"
      href="https://enc-india.info"
      rel="noopener"
    >
      Continue now
    </a>

    <p class="footer">
      If the redirect does not start automatically, use the button above.
    </p>
  </main>

  <script>
    const destination = "https://enc-india.info/";
    const countdownElement = document.getElementById("countdown");
    const statusElement = document.getElementById("status");

    const currentUrl = new URL(window.location.href);
    const targetUrl = new URL(destination);

    // Prevent an infinite redirect if this page is hosted on enc-india.info.
    const alreadyOnDestination =
      currentUrl.hostname === targetUrl.hostname &&
      currentUrl.protocol === targetUrl.protocol;

    if (alreadyOnDestination) {
      statusElement.textContent = "You are already on the ENC India website.";
    } else {
      let remaining = 3;

      const timer = window.setInterval(() => {
        remaining -= 1;
        countdownElement.textContent = remaining;

        if (remaining <= 0) {
          window.clearInterval(timer);
          window.location.replace(destination);
        }
      }, 1000);
    }
  </script>
</body>
</html>
